<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedEditAI — 界面原型</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 桌面背景，用于衬托 macOS 应用窗口 -->
  <div class="desktop">
    <!-- 应用窗口 -->
    <div class="window" id="appWindow">
      <!-- 标题栏 -->
      <header class="titlebar">
        <div class="traffic-lights">
          <span class="tl tl-close"></span>
          <span class="tl tl-min"></span>
          <span class="tl tl-max"></span>
        </div>
        <div class="titlebar-title" id="titlebarTitle">MedEditAI</div>
        <div class="titlebar-actions">
          <button class="icon-btn" id="themeToggle" title="切换深/浅色">
            <svg viewBox="0 0 24 24" class="ico"><path d="M12 3v2M12 19v2M5 12H3M21 12h-2M6.3 6.3 4.9 4.9M19.1 19.1l-1.4-1.4M17.7 6.3l1.4-1.4M4.9 19.1l1.4-1.4M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"/></svg>
          </button>
        </div>
      </header>

      <div class="window-body">
        <!-- 左侧导航栏 -->
        <aside class="sidebar">
          <div class="brand">
            <div class="brand-logo">
              <svg viewBox="0 0 24 24" class="ico"><path d="M12 2 4 6v6c0 5 3.4 8.5 8 10 4.6-1.5 8-5 8-10V6l-8-4Z"/><path d="M12 8v8M8 12h8"/></svg>
            </div>
            <div class="brand-name">MedEditAI</div>
          </div>

          <nav class="nav" id="mainNav">
            <div class="nav-group-label">工作台</div>
            <a class="nav-item active" data-view="dashboard"><svg viewBox="0 0 24 24" class="ico"><path d="M3 13h8V3H3v10Zm0 8h8v-6H3v6Zm10 0h8V11h-8v10Zm0-18v6h8V3h-8Z"/></svg><span>仪表盘</span></a>
            <a class="nav-item" data-view="search"><svg viewBox="0 0 24 24" class="ico"><path d="M11 4a7 7 0 1 0 0 14 7 7 0 0 0 0-14Zm10 17-5.2-5.2"/></svg><span>检索中心</span></a>
            <a class="nav-item" data-view="library"><svg viewBox="0 0 24 24" class="ico"><path d="M4 5v14M8 5v14M13 5l5 14M13 5l-1 .3M18 19l1-.3"/></svg><span>文献库</span><span class="badge">127</span></a>
            <a class="nav-item" data-view="enrich"><svg viewBox="0 0 24 24" class="ico"><path d="M12 3v4M12 17v4M5 12H1M23 12h-4M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"/></svg><span>AI 加工</span></a>
            <a class="nav-item" data-view="slides"><svg viewBox="0 0 24 24" class="ico"><path d="M3 4h18v12H3zM8 20h8M12 16v4"/></svg><span>产出生成</span></a>

            <div class="nav-group-label">项目</div>
            <a class="nav-item project-item active-project" data-project="PFA图书馆"><span class="dot dot-teal"></span><span>PFA 图书馆</span></a>
            <a class="nav-item project-item" data-project="房颤消融"><span class="dot dot-blue"></span><span>房颤消融监测</span></a>
            <a class="nav-item project-item" data-project="肿瘤免疫"><span class="dot dot-purple"></span><span>肿瘤免疫治疗</span></a>
            <a class="nav-item nav-add"><svg viewBox="0 0 24 24" class="ico"><path d="M12 5v14M5 12h14"/></svg><span>新建项目</span></a>
          </nav>

          <div class="sidebar-footer">
            <a class="nav-item" data-view="settings"><svg viewBox="0 0 24 24" class="ico"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.4 1a7 7 0 0 0-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 0 0-1.7 1l-2.4-1-2 3.4L4.1 11a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 1.7 1l.4 2.5h4l.4-2.5a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.6a7 7 0 0 0 .1-1Z"/></svg><span>设置</span></a>
          </div>
        </aside>

        <!-- 主内容区，由 JS 渲染 -->
        <main class="content" id="content"></main>
      </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-wrap" id="toastWrap"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
