<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedEditAI — 界面原型</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 桌面背景，用于衬托 macOS 应用窗口 -->
  <div class="desktop">
    <!-- 应用窗口 -->
    <div class="window" id="appWindow">
      <!-- 标题栏 -->
      <header class="titlebar">
        <div class="traffic-lights">
          <span class="tl tl-close"></span>
          <span class="tl tl-min"></span>
          <span class="tl tl-max"></span>
        </div>
        <div class="titlebar-title" id="titlebarTitle">MedEditAI</div>
        <div class="titlebar-actions">
          <button class="icon-btn" id="themeToggle" title="切换深/浅色">
            <svg viewBox="0 0 24 24" class="ico"><path d="M12 3v2M12 19v2M5 12H3M21 12h-2M6.3 6.3 4.9 4.9M19.1 19.1l-1.4-1.4M17.7 6.3l1.4-1.4M4.9 19.1l1.4-1.4M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"/></svg>
          </button>
        </div>
      </header>

      <div class="window-body">
        <!-- 左侧导航栏 -->
        <aside class="sidebar">
          <div class="brand">
            <div class="brand-logo">
              <svg viewBox="0 0 24 24" class="ico"><path d="M12 2 4 6v6c0 5 3.4 8.5 8 10 4.6-1.5 8-5 8-10V6l-8-4Z"/><path d="M12 8v8M8 12h8"/></svg>
            </div>
            <div class="brand-name">MedEditAI</div>
          </div>

          <nav class="nav" id="mainNav">
            <div class="nav-group-label">工作台</div>
            <a class="nav-item active" data-view="dashboard"><svg viewBox="0 0 24 24" class="ico"><path d="M3 13h8V3H3v10Zm0 8h8v-6H3v6Zm10 0h8V11h-8v10Zm0-18v6h8V3h-8Z"/></svg><span>仪表盘</span></a>
            <a class="nav-item" data-view="search"><svg viewBox="0 0 24 24" class="ico"><path d="M11 4a7 7 0 1 0 0 14 7 7 0 0 0 0-14Zm10 17-5.2-5.2"/></svg><span>检索中心</span></a>
            <a class="nav-item" data-view="library"><svg viewBox="0 0 24 24" class="ico"><path d="M4 5v14M8 5v14M13 5l5 14M13 5l-1 .3M18 19l1-.3"/></svg><span>文献库</span><span class="badge">127</span></a>
            <a class="nav-item" data-view="enrich"><svg viewBox="0 0 24 24" class="ico"><path d="M12 3v4M12 17v4M5 12H1M23 12h-4M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"/></svg><span>AI 加工</span></a>
            <a class="nav-item" data-view="slides"><svg viewBox="0 0 24 24" class="ico"><path d="M3 4h18v12H3zM8 20h8M12 16v4"/></svg><span>产出生成</span></a>

            <div class="nav-group-label">项目</div>
            <a class="nav-item project-item active-project" data-project="PFA图书馆"><span class="dot dot-teal"></span><span>PFA 图书馆</span></a>
            <a class="nav-item project-item" data-project="房颤消融"><span class="dot dot-blue"></span><span>房颤消融监测</span></a>
            <a class="nav-item project-item" data-project="肿瘤免疫"><span class="dot dot-purple"></span><span>肿瘤免疫治疗</span></a>
            <a class="nav-item nav-add"><svg viewBox="0 0 24 24" class="ico"><path d="M12 5v14M5 12h14"/></svg><span>新建项目</span></a>
          </nav>

          <div class="sidebar-footer">
            <a class="nav-item" data-view="settings"><svg viewBox="0 0 24 24" class="ico"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.4 1a7 7 0 0 0-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 0 0-1.7 1l-2.4-1-2 3.4L4.1 11a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 1.7 1l.4 2.5h4l.4-2.5a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.6a7 7 0 0 0 .1-1Z"/></svg><span>设置</span></a>
          </div>
        </aside>

        <!-- 主内容区，由 JS 渲染 -->
        <main class="content" id="content"></main>
      </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-wrap" id="toastWrap"></div>

    <!-- AI Prompt Editor Modal -->
    <div id="promptDialog" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; justify-content: center; align-items: center;">
      <div class="card" style="width: 660px; height: 600px; display: flex; flex-direction: column; background: var(--bg); box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
        <div style="padding: 20px; border-bottom: 1px solid var(--line);">
          <div style="font-size: 17px; font-weight: bold; margin-bottom: 6px;">AI 加工 Prompt 模板</div>
          <div style="font-size: 12px; color: var(--text-secondary);">占位符：{title} {abstract} {keywords} {candidates}。</div>
        </div>
        <div style="padding: 20px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;">
          <div>
            <div style="font-size: 11px; font-weight: bold; color: var(--text-tertiary); text-transform: uppercase; margin-bottom: 4px;">翻译 · SYSTEM</div>
            <textarea class="field-input" style="width: 100%; height: 44px; font-family: monospace; font-size: 12.5px; resize: none;">You are a precise medical editing assistant. Never fabricate.</textarea>
          </div>
          <div>
            <div style="font-size: 11px; font-weight: bold; color: var(--text-tertiary); text-transform: uppercase; margin-bottom: 4px;">翻译 · USER</div>
            <textarea class="field-input" style="width: 100%; height: 120px; font-family: monospace; font-size: 12.5px; resize: none;">你是医学翻译助手。仅基于给定文本，将标题、摘要、关键词翻译成简体中文，不得编造。
以 JSON 输出：{"titleCN":"","abstractCN":"","keywordsCN":[]}
标题：{title}
摘要：{abstract}
关键词：{keywords}</textarea>
          </div>
          <div>
            <div style="font-size: 11px; font-weight: bold; color: var(--text-tertiary); text-transform: uppercase; margin-bottom: 4px;">主题分类 · USER</div>
            <textarea class="field-input" style="width: 100%; height: 120px; font-family: monospace; font-size: 12.5px; resize: none;">从候选主题路径中选择最匹配的一条，仅基于给定文本，未匹配则选择最接近的一条并降低置信度。
以 JSON 输出：{"topicPath":"","confidence":0.0}
候选：{candidates}
标题：{title}
摘要：{abstract}</textarea>
          </div>
        </div>
        <div style="padding: 20px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center;">
          <button class="btn btn-ghost" onclick="toast('已恢复默认')">恢复默认</button>
          <div style="display: flex; gap: 8px;">
            <button class="btn" onclick="document.getElementById('promptDialog').style.display='none'">取消</button>
            <button class="btn btn-primary" onclick="toast('已保存 AI Prompt 模板'); document.getElementById('promptDialog').style.display='none'">保存</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
