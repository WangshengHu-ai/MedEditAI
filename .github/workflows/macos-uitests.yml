name: macOS UI Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: macos-uitests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-tests:
    runs-on: macos-15
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          sw_vers
          xcodebuild -version
          xcodebuild -list -project MedEditAI.xcodeproj

      - name: Run E2E UI tests
        run: |
          set +e
          xcodebuild test \
            -project MedEditAI.xcodeproj \
            -scheme MedEditAIUITests \
            -destination 'platform=macOS' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES 2>&1 | tee build.log
          code=${PIPESTATUS[0]}
          echo "xcodebuild exit code = $code"
          echo "----- diagnostic summary -----"
          grep -nE "\*\* (BUILD|TEST) (FAILED|SUCCEEDED) \*\*|error:|Testing failed:|Failing tests:|Test Case .* (failed|passed)|Code ?Sign|Provisioning|Sandbox|could not be launched|Unable to|No such|Assertion Failure" build.log | tail -n 50 | while IFS= read -r line; do echo "::error::${line}"; done
          exit $code

      - name: Upload test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: TestResults.xcresult
          if-no-files-found: ignore
          retention-days: 7
