name: macOS UI Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: macos-uitests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-tests:
    runs-on: macos-15
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          sw_vers
          xcodebuild -version
          xcodebuild -list -project MedEditAI.xcodeproj

      - name: Run E2E UI tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project MedEditAI.xcodeproj \
            -scheme MedEditAIUITests \
            -destination 'platform=macOS' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES

      - name: Upload test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results
          path: TestResults.xcresult
          if-no-files-found: ignore
          retention-days: 7
