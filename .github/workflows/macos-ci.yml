name: macOS CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: macos-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Resolve package dependencies
        run: swift package resolve

      - name: Build
        run: |
          set +e
          swift build -v 2>&1 | tee build.log
          code=${PIPESTATUS[0]}
          grep -nE "error:" build.log | head -n 40 | while IFS= read -r line; do echo "::error::${line}"; done
          exit $code

      - name: Test
        run: |
          set +e
          swift test -v 2>&1 | tee test.log
          code=${PIPESTATUS[0]}
          grep -nE "error:|XCTAssert|Failing tests:|Test Case .* failed" test.log | head -n 60 | while IFS= read -r line; do echo "::error::${line}"; done
          exit $code
